<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login Form</title>

    <!-- Agrega la referencia a Bootstrap CSS -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <!-- Agrega la referencia a Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>

    <script defer src="js/authService.js"></script>
    <script defer src="js/credentials.js"></script>

    <style>
      .postit {
        background: linear-gradient(135deg, #fff9c4 0%, #fff59d 100%);
        border: 1px solid #f9a825;
        border-radius: 4px;
        box-shadow: 0 4px 6px rgba(0, 0, 0, 0.15), -1px 4px 6px rgba(249, 168, 37, 0.4);
        padding: 15px;
        width: 250px;
        font-size: 15px;
        color: #333;
        line-height: 1;
        transform: rotate(-3deg);
        z-index: 10;
        margin-bottom: 30px;
      }

      /* Desktop: positioned absolutely to the right */
      @media (min-width: 768px) {
        .postit {
          position: absolute;
          top: 20px;
          right: 40px;
          margin-bottom: 0;
        }
      }

      /* Mobile: below the title, full width friendly */
      @media (max-width: 767px) {
        .postit {
          position: static;
          width: 50%;
          max-width: 150px;
          margin: 0 auto 30px auto;
        }
      }
      .postit-title {
        font-weight: bold;
        margin-bottom: 10px;
        text-decoration: underline;
        margin-top: 10px;
      }

      .postit-item {
        margin: 5px 0;
      }
    </style>

  <body class="container mt-5">
    <h2>Login</h2>

    <!-- Post-it con credenciales -->
    <div class="postit">
      <div class="postit-title">Credenciales de Prueba</div>
      <div class="postit-item"><strong>Users:</strong></div>
      <div class="postit-item">• root</div>
      <div class="postit-item">• patient1</div>
      <div class="postit-item">• doctor1</div>
      <div class="postit-item" style="margin-top: 10px;"><strong>Password:</strong></div>
      <div class="postit-item">• root</div>
    </div>

    <div class="row mb-3">
      <label for="username" class="col-sm-2 col-form-label">Username:</label>
      <div class="col-sm-3">
        <input
          type="text"
          class="form-control"
          id="username"
          name="username"
          required
        />
      </div>
    </div>
    <div class="row mb-3">
      <label for="password" class="col-sm-2 col-form-label">Password:</label>
      <div class="col-sm-3">
        <input
          type="password"
          class="form-control"
          id="password"
          name="password"
          required
        />
      </div>
    </div>
    <div class="row">
      <div class="col-sm-10 offset-sm-2">
        <button id="bCheck" class="btn btn-primary">Login</button>
        <p id="WrongCred" class="mt-3 text-danger"></p>
      </div>
    </div>
  </body>
</html>
